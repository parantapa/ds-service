edition = "2023";

service DsService {
    rpc MapSet(MapSetRequest) returns (Empty) {}
    rpc MapGet(MapGetRequest) returns (MapGetResponse) {}
    rpc MapSearchKey(MapSearchKeyRequest) returns (MapSearchKeyResponse) {}

    rpc TaskAdd(TaskAddRequest) returns (Empty) {}
    rpc TaskStatus(TaskStatusRequest) returns (TaskStatusResponse) {}

    rpc TaskGet(TaskGetRequest) returns (TaskGetResponse) {}
    rpc TaskDone(TaskDoneRequest) returns (Empty) {}

    rpc Requeue(RequeueRequest) returns (Empty) {}

    rpc JournalSize(JournalSizeRequest) returns (JournalSizeResponse) {}
    rpc JournalRead(JournalReadRequest) returns (JournalReadResponse) {}
    rpc JournalAppend(JournalAppendRequest) returns (Empty) {}

    rpc TimeSeriesAppend(TimeSeriesAppendRequest) returns (Empty) {}
    rpc TimeSeriesGet(TimeSeriesGetRequest) returns (TimeSeriesGetResponse) {}

    rpc MutexTryAcquire(MutexTryAcquireRequest) returns (MutexTryAcquireResponse) {}
    rpc MutexRelease(MutexReleaseRequest) returns (Empty) {}

    rpc CounterGetNextValue(CounterGetNextValueRequest) returns (CounterGetNextValueResponse) {}
};

message Empty {}

message MapSetRequest {
    string key = 1;
    bytes value = 2;
}

message MapGetRequest {
    string key = 1;
}

message MapGetResponse {
    bytes value = 1;
}

message MapSearchKeyRequest {
    string pattern = 1;
}

message MapSearchKeyResponse {
    repeated string key = 1;
}

message TaskAddRequest {
    string task_id = 1;
    repeated string queue = 2;
    double priority = 3;
    bytes function = 4;
    bytes input = 5;
}

enum TaskState {
    Ready = 0;
    Running = 1;
    Complete = 2;
}

message TaskStatusRequest {
    string task_id = 1;
}

message TaskStatusResponse {
    TaskState state = 1;
    bytes output = 2;
}

message TaskGetRequest {
    string worker_id = 1;
    repeated string queue = 2;
}

message TaskGetResponse {
    string task_id = 1;
    bytes function = 2;
    bytes input = 3;
}

message TaskDoneRequest {
    string task_id = 1;
    bytes output = 2;
}

message RequeueRequest {
    double timeout_s = 1;
}

message JournalSizeRequest {
    string key = 1;
}

message JournalSizeResponse {
    uint64 size = 1;
}

message JournalReadRequest {
    string key = 1;
    uint64 start = 2;
    uint64 end = 3;
}

message JournalReadResponse {
    repeated bytes entry = 1;
}

message JournalAppendRequest {
    string key = 1;
    bytes value = 2;
}

// datetime is ISO 8601 UTC datetime string
// (e.g. "2024-01-02T03:04:05Z" or "...+00:00").
// step is optional; when omitted it defaults to 0.
message TimeSeriesAppendRequest {
    string key = 1;
    double value = 2;
    string datetime = 3;
    int64 step = 4;
}

message TimeSeriesDataPoint {
    double value = 1;
    string datetime = 2;
    int64 step = 3;
}

// All four filter fields are optional.
// start_time / start_step are inclusive lower bounds.
// end_time / end_step are exclusive upper bounds.
// An unset field imposes no bound.
// Time bounds are ISO 8601 UTC datetime strings.
message TimeSeriesGetRequest {
    string key = 1;
    string start_time = 2;
    string end_time = 3;
    int64 start_step = 4;
    int64 end_step = 5;
}

message TimeSeriesGetResponse {
    repeated TimeSeriesDataPoint point = 1;
}

// Acquiring a mutex that does not exist creates it first.
message MutexTryAcquireRequest {
    string key = 1;
}

// acquired is true if the mutex was acquired by this call,
// false if it was already held by someone else.
message MutexTryAcquireResponse {
    bool acquired = 1;
}

message MutexReleaseRequest {
    string key = 1;
}

// The first call for a given key creates the counter and returns 1; each
// subsequent call returns the previous value plus one.
message CounterGetNextValueRequest {
    string key = 1;
}

message CounterGetNextValueResponse {
    uint64 value = 1;
}
